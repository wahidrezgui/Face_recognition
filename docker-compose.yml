services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres-gatevision:
    image: postgres:16-alpine
    container_name: gatevision-db
    environment:
      POSTGRES_USER: gatevision
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: gatevision
    ports:
      - "6667:5432"
    networks:
      - devnet
    volumes:
      - postgres_gatevision_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatevision -d gatevision"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gatevision-redis
    command: redis-server --requirepass "${REDIS_PASSWORD:-redisdevpass}"
    ports:
      - "6379:6379"
    networks:
      - devnet
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: gatevision-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - devnet
    restart: unless-stopped
 
  # ── Test: MySQL + phpMyAdmin ────────────────────────────────
  mysql-test:
    image: mysql:8.0
    container_name: gatevision-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: gatedb
      MYSQL_USER: testuser
      MYSQL_PASSWORD: testpass
    ports:
      - "3306:3306"
    networks:
      - devnet
    volumes:
      - mysql_test_data:/var/lib/mysql
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: gatevision-phpmyadmin
    environment:
      PMA_HOST: mysql-test
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: rootpass
    ports:
      - "8080:80"
    networks:
      - devnet
    depends_on:
      - mysql-test
    restart: unless-stopped

volumes:
  postgres_gatevision_data:
    driver: local
  qdrant_data:
    driver: local
  gate_v2_data:
    driver: local
  mysql_test_data:
    driver: local

networks:
  devnet:
    external: true

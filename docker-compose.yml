services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres-gatevision:
    image: postgres:16-alpine
    container_name: gatevision-db
    environment:
      POSTGRES_USER: gatevision
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: gatevision
    ports:
      - "6667:5432"
    networks:
      - devnet
    volumes:
      - postgres_gatevision_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatevision -d gatevision"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gatevision-redis
    command: redis-server --requirepass "${REDIS_PASSWORD:-redisdevpass}"
    ports:
      - "6379:6379"
    networks:
      - devnet
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: gatevision-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - devnet
    restart: unless-stopped

  # ── .NET Backend ────────────────────────────────────────────
  gatevision-api:
    build:
      context: ./GateVision.Api
    container_name: gatevision-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://0.0.0.0:5000
      ConnectionStrings__DefaultConnection: "Host=postgres-gatevision;Port=5432;Database=gatevision;Username=gatevision;Password=localdev"
      ConnectionStrings__Redis: "redis:6379,password=${REDIS_PASSWORD:-redisdevpass}"
      Auth__JwtSecret: "${JWT_SECRET:-dev-secret-key-32-chars-min!!!!!}"
      Auth__ApiKey: "${API_KEY:-change-me-to-your-api-key}"
    ports:
      - "5000:5000"
    networks:
      - devnet
    depends_on:
      postgres-gatevision:
        condition: service_healthy
      redis:
        condition: service_started
      qdrant:
        condition: service_started
    restart: unless-stopped

  # ── Dashboard (Next.js) ─────────────────────────────────────
  dashboard:
    build:
      context: ./dashboard
    container_name: gatevision-dashboard
    environment:
      NEXT_PUBLIC_API_URL: ""
    ports:
      - "3000:3000"
    networks:
      - devnet
    restart: unless-stopped

  # ── Edge Node: Gate A ───────────────────────────────────────
  gate-a:
    build:
      context: ./gate_vision_ai
    container_name: gatevision-gate-a
    environment:
      GV_GATE_ID:           gate-a
      GV_NET_BACKEND_URL:   http://gatevision-api:5000
      GV_NET_API_KEY:       "${GATE_A_API_KEY:-change-me-to-your-api-key}"
      GV_CAMERA_SOURCE:     "${GATE_A_CAMERA_SOURCE:-0}"
      GV_DIRECTION:         entry
      GV_LOCAL_BUFFER_PATH: /data/gate_events_local.db
    volumes:
      - gate_a_buffer:/data
    networks:
      - devnet
    restart: unless-stopped

  # ── Edge Node: Gate B ───────────────────────────────────────
  gate-b:
    build:
      context: ./gate_vision_ai
    container_name: gatevision-gate-b
    environment:
      GV_GATE_ID:           gate-b
      GV_NET_BACKEND_URL:   http://gatevision-api:5000
      GV_NET_API_KEY:       "${GATE_B_API_KEY:-change-me-to-your-api-key}"
      GV_CAMERA_SOURCE:     "${GATE_B_CAMERA_SOURCE:-0}"
      GV_DIRECTION:         entry
      GV_LOCAL_BUFFER_PATH: /data/gate_events_local.db
    volumes:
      - gate_b_buffer:/data
    networks:
      - devnet
    restart: unless-stopped

  # ── nginx Reverse Proxy ─────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: gatevision-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - devnet
    restart: unless-stopped

volumes:
  postgres_gatevision_data:
    driver: local
  qdrant_data:
    driver: local
  gate_a_buffer:
    driver: local
  gate_b_buffer:
    driver: local

networks:
  devnet:
    driver: bridge

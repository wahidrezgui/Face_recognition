services:
  # ── Infrastructure ──────────────────────────────────────────
  postgres-gatevision:
    image: postgres:16-alpine
    container_name: gatevision-db
    environment:
      POSTGRES_USER: gatevision
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: gatevision
    ports:
      - "6667:5432"
    networks:
      - devnet
    volumes:
      - postgres_gatevision_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatevision -d gatevision"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gatevision-redis
    command: redis-server --requirepass "${REDIS_PASSWORD:-redisdevpass}"
    ports:
      - "6379:6379"
    networks:
      - devnet
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: gatevision-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - devnet
    restart: unless-stopped

  # ── Edge Nodes ──────────────────────────────────────────────
  # Gate A and Gate B run on separate Windows machines on the LAN.
  # See gate_vision_ai/README for setup instructions.

  # ── RTSP Test Stream ────────────────────────────────────────
  # Loops sample1.mp4 as an RTSP stream for local testing.
  # Stream URL (inside devnet): rtsp://rtsp-stream:8554/sample
  # HLS preview (host browser): http://localhost:8888/sample
  rtsp-stream:
    build:
      context: ./rtsp-stream
      dockerfile: Dockerfile
    container_name: gatevision-rtsp-stream
    volumes:
      - ./gate_vision_ai/sample1.mp4:/videos/sample1.mp4:ro
    ports:
      - "8554:8554" # RTSP
      - "8888:8888" # HLS browser preview
    networks:
      - devnet
    restart: unless-stopped

  # ── gate_vision_ai_v2 ───────────────────────────────────────
  # FastAPI edge service — PyramidBox + MobileFace, reads RTSP from rtsp-stream.
  # gate-vision-ai-v2:
  #   build:
  #     context: ./gate_vision_ai_v2
  #     dockerfile: Dockerfile
  #   container_name: gatevision-ai-v2
  #   environment:
  #     GV2_PORT: 8002
  #     GV2_CAMERA_SOURCE: rtsp://rtsp-stream:8554/sample
  #     GV2_RTSP_TRANSPORT: tcp
  #     GV2_RTSP_BUFFER_SIZE: 1
  #     GV2_NET_BACKEND_URL: http://host.docker.internal:5000
  #     GV2_GATE_ID: gate-v2-sample
  #   ports:
  #     - "8002:8002"
  #   volumes:
  #     - gate_v2_data:/data
  #     - ./gate_vision_ai_v2/Models/mobileface_v1.0_infer:/models/mobileface_v1.0_infer:ro
  #   depends_on:
  #     - rtsp-stream
  #   networks:
  #     - devnet
  #   restart: on-failure

volumes:
  postgres_gatevision_data:
    driver: local
  qdrant_data:
    driver: local
  gate_v2_data:
    driver: local

networks:
  devnet:
    external: true

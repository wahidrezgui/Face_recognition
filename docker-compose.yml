services:
  postgres-gatevision:
    image: postgres:16-alpine
    container_name: gatevision-db
    environment:
      POSTGRES_USER: gatevision
      POSTGRES_PASSWORD: localdev
      POSTGRES_DB: gatevision
    ports:
      - "6667:5432"
    networks:
      - devnet
    volumes:
      - postgres_gatevision_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gatevision -d gatevision"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: gatevision-redis
    ports:
      - "6379:6379"
    networks:
      - devnet
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant
    container_name: gatevision-qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC (used by .NET client)
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - devnet
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  postgres_gatevision_data:
    driver: local
  qdrant_data:
    driver: local

networks:
  devnet:
    external: true

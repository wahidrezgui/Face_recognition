upstream dotnet_api {
    server gatevision-api:5000;
}

upstream gate_vision_ai {
    server gate-a:8000;
    server gate-b:8000;
}

server {
    listen 80;
    server_name gatevision.local;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name gatevision.local;

    ssl_certificate     /etc/nginx/certs/gatevision.crt;
    ssl_certificate_key /etc/nginx/certs/gatevision.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ── Dashboard (Next.js) ───────────────────────────────────
    location / {
        proxy_pass http://dashboard:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── .NET API ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://dotnet_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SSE: disable ALL buffering ────────────────────────────
    location ~ ^/api/v1/events/stream {
        proxy_pass http://dotnet_api;
        proxy_buffering         off;
        proxy_cache             off;
        proxy_set_header        Connection "";
        proxy_http_version      1.1;
        proxy_read_timeout      3600s;
        add_header              X-Accel-Buffering no;
    }

    # ── Python AI microservice ────────────────────────────────
    location /vision/ {
        rewrite ^/vision(/.*)$ $1 break;
        proxy_pass http://gate_vision_ai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Static assets ─────────────────────────────────────────
    location /_next/static {
        proxy_pass http://dashboard:3000;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
